name: 🚀 Deploy LaraHealth (Direto p/ Produção)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Configurar PHP (Para ferramentas no Runner)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, pgsql, pdo_pgsql

      - name: 📦 Instalar dependências do Composer (Modo Produção)
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: 🟢 Configurar Node.js (Para os assets/frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Instalar dependências do Node e Rodar Builds do Vite
        run: |
          npm ci
          npm run build

      - name: 🤐 Criar Pacote de Deploy Compactado (Pronto para Uso)
        run: |
          mkdir build-tmp
          
          # CORREÇÃO: Incluídas as pastas 'routes' e 'bootstrap' inteiras no pacote de produção
          cp -r app bootstrap config database public routes storage vendor build-tmp/
          
          # Copia os arquivos vitais da raiz do projeto
          cp artisan composer.json package.json build-tmp/
          
          # Copia o .env.production como o .env oficial de produção
          cp .env.production build-tmp/.env 2>/dev/null || true
          
          # Remove o link de desenvolvimento gerado localmente (evita conflito no servidor)
          rm -f build-tmp/public/storage
          rm -f build-tmp/public/hot
          
          # Compacta o pacote limpo
          cd build-tmp
          zip -r ../deploy-larahealth.zip .
          cd ..

      - name: 🔑 Configurar Chave SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: 🚀 Transferir Pacote e Executar Comandos no Servidor
        run: |
          SERVER_IP="${{ secrets.SERVER_IP }}"

          # Envia o arquivo zip direto para a pasta tmp do servidor via SCP
          scp -o StrictHostKeyChecking=no deploy-larahealth.zip ubuntu@$SERVER_IP:/tmp/

          # Abre a conexão SSH para atualizar a pasta de produção
          ssh -o StrictHostKeyChecking=no ubuntu@$SERVER_IP << 'EOF'
            set -e

            BASE_DIR="/var/www/larahealth"

            # 1. Garante que o unzip está instalado no servidor
            if ! command -v unzip &> /dev/null; then
                echo "📦 Instalando unzip..."
                sudo apt-get update -y && sudo apt-get install unzip -y
            fi

            # 2. Cria a estrutura base caso não exista
            sudo mkdir -p "$BASE_DIR"

            # 3. Preserva a pasta de uploads do Storage real para não apagar fotos de pacientes
            if [ -d "$BASE_DIR/storage/app/public" ]; then
                echo "📸 Fazendo backup temporário dos uploads públicos..."
                sudo mv "$BASE_DIR/storage/app/public" /tmp/larahealth_storage_backup
            fi

            echo "🧹 Limpando arquivos antigos do servidor..."
            sudo rm -rf "${BASE_DIR:?}"/*

            # 4. Descompacta o novo pacote direto na pasta do site
            echo "📂 Descompactando novo pacote de deploy..."
            sudo unzip -o /tmp/deploy-larahealth.zip -d "$BASE_DIR"

            # 5. Restaura a pasta de uploads preservada
            if [ -d "/tmp/larahealth_storage_backup" ]; then
                echo "📸 Restaurando uploads públicos..."
                sudo rm -rf "$BASE_DIR/storage/app/public"
                sudo mv /tmp/larahealth_storage_backup "$BASE_DIR/storage/app/public"
            fi

            # 6. Executa as Migrações de Banco de Dados e os Links de Storage no Servidor Real
            echo "⚙️ Executando migrações e rotinas do Laravel..."
            cd "$BASE_DIR"
            
            # Limpa qualquer cache residual ANTES de mexer no banco
            sudo -u www-data php artisan config:clear
            sudo -u www-data php artisan route:clear

            # CORREÇÃO: Usamos migrate:fresh para limpar o banco e evitar erros de duplicidade (Unique Violation)
            # nas tabelas que estão populando massa de testes automaticamente (Regra do seu .clinerules)
            sudo -u www-data php artisan migrate:fresh --force
            sudo -u www-data php artisan db:seed --force

            # Recria o link simbólico público do storage com o usuário correto
            sudo -u www-data php artisan storage:link

            # Otimiza o Laravel gerando os novos caches SEMPRE como www-data
            sudo -u www-data php artisan config:cache
            sudo -u www-data php artisan route:cache

            # 7. Ajustar permissões finais de segurança para o Nginx
            echo "🔒 Alinhando permissões finais de segurança..."
            sudo chown -R www-data:www-data "$BASE_DIR"
            sudo find "$BASE_DIR" -type d -exec chmod 755 {} \;
            sudo find "$BASE_DIR" -type f -exec chmod 644 {} \;
            sudo chmod -R 775 "$BASE_DIR/storage" "$BASE_DIR/bootstrap/cache"

            # 8. Limpeza de arquivos temporários do servidor
            rm -f /tmp/deploy-larahealth.zip
            sudo rm -rf /tmp/larahealth_storage_backup
            
            echo "✅ Deploy de LaraHealth finalizado com sucesso absoluto!"

            # 7. Ajustar permissões finais de segurança para o Nginx
            echo "🔒 Alinhando permissões finais de segurança..."
            sudo find "$BASE_DIR" -type d -exec chmod 755 {} \;
            sudo find "$BASE_DIR" -type f -exec chmod 644 {} \;
            sudo chmod -R 775 "$BASE_DIR/storage" "$BASE_DIR/bootstrap/cache"

            # 7. Ajusta as permissões de arquivos para o Nginx (www-data) ler corretamente
            echo "🔒 Ajustando permissões de pasta para o Nginx..."
            sudo chown -R www-data:www-data "$BASE_DIR"
            sudo find "$BASE_DIR" -type d -exec chmod 755 {} \;
            sudo find "$BASE_DIR" -type f -exec chmod 644 {} \;
            
            # Garante escrita explícita nas pastas de logs e cache
            sudo chmod -R 775 "$BASE_DIR/storage" "$BASE_DIR/bootstrap/cache"

            # 8. Limpeza de arquivos temporários do servidor
            rm -f /tmp/deploy-larahealth.zip
            sudo rm -rf /tmp/larahealth_storage_backup
            
            echo "✅ Deploy de LaraHealth finalizado com sucesso absoluto!"
          EOF

      - name: 🧹 Limpar Runner do GitHub
        if: always()
        run: rm -rf build-tmp deploy-larahealth.zip